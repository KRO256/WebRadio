<!DOCTYPE html>
<html data-theme="dark">
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/daisyui@latest/dist/full.css" rel="stylesheet">
</head>

<body class="bg-base-200 h-screen">

<div class="flex h-full">
  <div class="w-72 bg-base-100 shadow-lg p-4">
    <h2 class="text-xl font-bold mb-4">Stations</h2>
    <input id="searchInput" class="input input-bordered w-full mt-3" placeholder="Search">
    <button id="searchBtn" class="btn btn-secondary w-full mt-2">Search</button>
    <select id="resultList" size="10" class="select select-bordered w-full mt-3"></select>

    <ul class="menu bg-base-200 rounded-box" id="stationList">
      <li><a data-url="http://ice1.somafm.com/groovesalad-128-mp3">
        SomaFM - Groove Salad
      </a></li>
      <li><a data-url="http://ice1.somafm.com/spacestation-128-mp3">
        SomaFM - Space Station
      </a></li>
      <li><a data-url="http://ice1.somafm.com/dronezone-128-mp3">
        SomaFM - Drone Zone
      </a></li>
    </ul>
  </div>

  <div class="flex-1 flex items-center justify-center">
    <div class="card w-96 bg-base-100 shadow-xl">
      <div class="card-body items-center text-center">
        <div class="w-full mb-4">
          <select id="themeSelect" class="select select-bordered w-full">
            <option disabled selected>Choose Theme</option>
            <option value="light">light</option>
            <option value="dark">dark</option>
            <option value="cupcake">cupcake</option>
            <option value="bumblebee">bumblebee</option>
            <option value="emerald">emerald</option>
            <option value="corporate">corporate</option>
            <option value="synthwave">synthwave</option>
            <option value="retro">retro</option>
            <option value="cyberpunk">cyberpunk</option>
            <option value="valentine">valentine</option>
            <option value="halloween">halloween</option>
            <option value="garden">garden</option>
            <option value="forest">forest</option>
            <option value="aqua">aqua</option>
            <option value="lofi">lofi</option>
            <option value="pastel">pastel</option>
            <option value="fantasy">fantasy</option>
            <option value="wireframe">wireframe</option>
            <option value="black">black</option>
            <option value="luxury">luxury</option>
            <option value="dracula">dracula</option>
            <option value="cmyk">cmyk</option>
            <option value="autumn">autumn</option>
            <option value="business">business</option>
            <option value="acid">acid</option>
            <option value="lemonade">lemonade</option>
            <option value="night">night</option>
            <option value="coffee">coffee</option>
            <option value="winter">winter</option>
            <option value="dim">dim</option>
            <option value="nord">nord</option>
            <option value="sunset">sunset</option>
          </select>
        </div>

        <h2 class="card-title">Web Radio Player</h2>

        <p id="nowPlaying" class="text-sm opacity-70">
          Select a station
        </p>

        <p id="connectionStatus" class="text-xs mt-1 badge badge-neutral">
          Disconnected
        </p>

        <div class="text-xs mt-2 space-y-1">
          <div id="connectionTime">Time: 00:00</div>
          <div id="bitrate">Speed: -- kbps</div>
        </div>

        <audio id="radio" crossorigin="anonymous"></audio>

        <canvas id="visualizer" class="w-full mt-4" height="150"></canvas>

        <button id="playBtn" class="btn btn-primary mt-4 w-full">
          Play
        </button>

        <input type="range" id="volume"
          min="0" max="1" step="0.01"
          class="range mt-4" value="0.5">

      </div>
    </div>

  </div>

</div>

<script>
const radio = document.getElementById("radio");
const btn = document.getElementById("playBtn");
const volume = document.getElementById("volume");
const stationList = document.getElementById("stationList");
const nowPlaying = document.getElementById("nowPlaying");
const connectionStatus = document.getElementById("connectionStatus");
const connectionTime = document.getElementById("connectionTime");
const bitrateDisplay = document.getElementById("bitrate");
const themeSelect = document.getElementById("themeSelect");
const html = document.documentElement;
const searchInput = document.getElementById("searchInput");
const searchBtn = document.getElementById("searchBtn");
const resultList = document.getElementById("resultList");
const canvas = document.getElementById("visualizer");
const ctx = canvas.getContext("2d");
canvas.width = canvas.offsetWidth;
const audioContext = new (window.AudioContext || window.webkitAudioContext)();
const source = audioContext.createMediaElementSource(radio);
const analyser = audioContext.createAnalyser();
analyser.fftSize = 256;
analyser.smoothingTimeConstant = 0.95;
source.connect(analyser);
analyser.connect(audioContext.destination);
const bufferLength = analyser.frequencyBinCount;
const dataArray = new Uint8Array(bufferLength);

const savedTheme = localStorage.getItem("theme");
if (savedTheme) {
  html.setAttribute("data-theme", savedTheme);
  themeSelect.value = savedTheme;
}

themeSelect.addEventListener("change", (e) => {
  const theme = e.target.value;
  html.setAttribute("data-theme", theme);
  localStorage.setItem("theme", theme);
});

searchBtn.onclick = async () => {
  const keyword = searchInput.value.trim();
  if (!keyword) return;

  resultList.innerHTML = "Searching...";

  try {
    const res = await fetch(
      `https://de1.api.radio-browser.info/json/stations/search?name=${encodeURIComponent(keyword)}&limit=20`
    );
    const data = await res.json();

    resultList.innerHTML = "";

    data.forEach(station => {
      if (!station.url_resolved) return;

      const option = document.createElement("option");
      option.value = station.url_resolved;
      option.textContent = `${station.name} (${station.country})`;
      resultList.appendChild(option);
    });

  } catch (err) {
    resultList.innerHTML = "Failed Search";
  }
};

resultList.onchange = async () => {
  await audioContext.resume();
  radio.src = resultList.value;
  radio.play();
  nowPlaying.textContent = resultList.options[resultList.selectedIndex].text;
  btn.textContent = "Pause";
};

radio.volume = 0.5;

btn.onclick = async () => {
  await audioContext.resume();

  if (radio.paused) {
    radio.play();
    btn.textContent = "Pause";
  } else {
    radio.pause();
    btn.textContent = "Play";
  }
};

stationList.querySelectorAll("a").forEach(item => {
  item.onclick = () => {
    const url = item.dataset.url;
    radio.src = url;
    radio.play();
    btn.textContent = "Pause";
    nowPlaying.textContent = item.textContent;
  };
});

volume.oninput = () => {
  radio.volume = volume.value;
};

function draw() {
  requestAnimationFrame(draw);

  analyser.getByteFrequencyData(dataArray);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const barWidth = (canvas.width / bufferLength) * 2;
  let x = 0;

  for (let i = 0; i < bufferLength; i++) {
    const barHeight = dataArray[i];

    ctx.fillStyle = `rgb(${barHeight + 100}, 50, 200)`;
    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

    x += barWidth + 1;
  }
}

draw();

function setStatus(text, type) {
  connectionStatus.textContent = text;
  connectionStatus.className = "text-xs mt-1 badge " + type;
}

radio.addEventListener("loadstart", () => {
  setStatus("Connecting...", "badge-warning");
});

radio.addEventListener("waiting", () => {
  setStatus("Buffering...", "badge-warning");
});

radio.addEventListener("playing", () => {
  startTimer();
  startBitrateMonitor();
  setStatus("Connected", "badge-success");
});

radio.addEventListener("pause", () => {
  stopTimer();
  stopBitrateMonitor();
  setStatus("Paused", "badge-info");
});

radio.addEventListener("error", () => {
  stopTimer();
  stopBitrateMonitor();
  setStatus("Connection Error", "badge-error");
});

radio.addEventListener("ended", () => {
  stopTimer();
  stopBitrateMonitor();
  setStatus("Disconnected", "badge-neutral");
});

let startTime = null;
let timerInterval = null;

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const diff = Math.floor((Date.now() - startTime) / 1000);
    const min = String(Math.floor(diff / 60)).padStart(2, "0");
    const sec = String(diff % 60).padStart(2, "0");
    connectionTime.textContent = `Time: ${min}:${sec}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
  connectionTime.textContent = "Time: 00:00";
}

let lastBuffered = 0;
let lastCheck = Date.now();
let bitrateInterval = null;

function startBitrateMonitor() {
  bitrateInterval = setInterval(() => {
    if (radio.buffered.length > 0) {
      const bufferedEnd = radio.buffered.end(0);
      const now = Date.now();

      const timeDiff = (now - lastCheck) / 1000;
      const bufferDiff = bufferedEnd - lastBuffered;

      if (timeDiff > 0 && bufferDiff > 0) {
        const kbps = ((bufferDiff * 128) / timeDiff).toFixed(1); 
        bitrateDisplay.textContent = `Speed: ~${kbps} kbps`;
      }

      lastBuffered = bufferedEnd;
      lastCheck = now;
    }
  }, 2000);
}

function stopBitrateMonitor() {
  clearInterval(bitrateInterval);
  bitrateDisplay.textContent = "Speed: -- kbps";
}

document.addEventListener("keydown", (e) => {
  if (e.code === "Space" && e.target.tagName !== "INPUT") {
    e.preventDefault();

    if (radio.paused) {
      radio.play();
      btn.textContent = "Pause";
    } else {
      radio.pause();
      btn.textContent = "Play";
    }
  }
});

document.addEventListener("keydown", (e) => {
  if (e.code === "ArrowUp" && e.target.tagName !== "INPUT") {
    e.preventDefault();
    radio.volume = Math.min(1, radio.volume + 0.05);
    volume.value = radio.volume;
  }

  if (e.code === "ArrowDown" && e.target.tagName !== "INPUT") {
    e.preventDefault();
    radio.volume = Math.max(0, radio.volume - 0.05);
    volume.value = radio.volume;
  }
});

document.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() === "m" && e.target.tagName !== "INPUT") {
    radio.muted = !radio.muted;
  }
});

searchInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    searchBtn.click();
  }
});

document.addEventListener("keydown", (e) => {
  const options = resultList.options;
  if (!options.length) return;

  let index = resultList.selectedIndex;

  if (e.code === "ArrowRight" && e.target.tagName !== "INPUT") {
    index = Math.min(options.length - 1, index + 1);
    resultList.selectedIndex = index;
  }

  if (e.code === "ArrowLeft" && e.target.tagName !== "INPUT") {
    index = Math.max(0, index - 1);
    resultList.selectedIndex = index;
  }
});

document.addEventListener("keydown", (e) => {
  if (e.ctrlKey && e.key === "l") {
    e.preventDefault();
    document.querySelector("input").focus();
  }
});
</script>

</body>
</html>
